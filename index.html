<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#ff0080,#7928ca);
    color:white;
}

.topbar{
    background:#111;
    padding:14px;
    text-align:center;
    font-size:18px;
    font-weight:bold;
    border-bottom:1px solid #333;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.main-card{
    position:relative;
    overflow:hidden;
    border-radius:25px;
    border:3px solid #ff2d7a;
    cursor:pointer;
    box-shadow:0 0 25px rgba(255,0,128,0.4);
}

.main-card img{
    width:100%;
    display:block;
}

.play{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:110px;
    height:110px;
    border-radius:50%;
    background:#ff007f;
    display:flex;
    justify-content:center;
    align-items:center;
    animation:pulse 1.5s infinite;
}

.play:before{
    content:'';
    border-left:35px solid white;
    border-top:22px solid transparent;
    border-bottom:22px solid transparent;
    margin-left:8px;
}

@keyframes pulse{
    0%{transform:translate(-50%,-50%) scale(1);}
    50%{transform:translate(-50%,-50%) scale(1.1);}
    100%{transform:translate(-50%,-50%) scale(1);}
}

.timer{
    position:absolute;
    right:15px;
    bottom:15px;
    background:rgba(0,0,0,0.7);
    padding:8px 15px;
    border-radius:10px;
    font-size:22px;
    font-weight:bold;
}

.title{
    text-align:center;
    color:#ff2d7a;
    font-size:48px;
    margin-top:30px;
    font-weight:bold;
}

.desc{
    text-align:center;
    color:#ccc;
    margin-top:15px;
    font-size:22px;
    line-height:1.6;
}

.btn{
    display:block;
    text-align:center;
    margin-top:20px;
    background:#ff2d7a;
    padding:22px;
    border-radius:18px;
    color:white;
    text-decoration:none;
    font-size:24px;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    background:#ff0080;
    transform:scale(1.03);
}

.banner{
    margin:35px 0;
}

.banner img{
    width:100%;
    border-radius:15px;
}

.gallery{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    justify-content:center;
}

.gallery img{
    width:200px;
    height:200px;
    object-fit:cover;
    border-radius:18px;
    border:3px solid #ff2d7a;
    transition:0.3s;
}

.gallery img:hover{
    transform:scale(1.05);
}

.check{
    margin-top:40px;
    text-align:center;
    color:#ddd;
    font-size:20px;
    line-height:1.8;
}

@media(max-width:600px){

.title{
    font-size:34px;
}

.desc{
    font-size:18px;
}

.btn{
    font-size:20px;
    padding:18px;
}

.gallery img{
    width:45%;
    height:150px;
}

}
